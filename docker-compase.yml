# ============================================================
# docker-compose.yml — Full local + production-parity stack
#
# Services:
#   app    — FastAPI RAG backend
#   redis  — Cache (exact-match query cache)
#   nginx  — Reverse proxy + static file serving
#
# Usage:
#   docker compose up --build          # first time
#   docker compose up -d               # background
#   docker compose logs -f app         # watch logs
#   docker compose down                # stop
#   docker compose down -v             # stop + delete volumes
# ============================================================

version: "3.9"

services:

  # ── RAG API ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - EMBEDDING_PROVIDER=huggingface
      - EMBEDDING_MODEL=BAAI/bge-base-en-v1.5
      - EMBEDDING_DEVICE=cpu
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - CHROMA_COLLECTION_NAME=rag_documents
      - REDIS_URL=redis://redis:6379
      - REDIS_CACHE_TTL_SECONDS=3600
      - QUERY_EXPANSION_ENABLED=true
      - QUERY_EXPANSION_N=3
      - RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - MAX_PDF_FILES=5
      - MAX_PDF_SIZE_MB=20
      - UPLOAD_DIR=/app/data/uploads
      - TOP_K_RETRIEVAL=10
      - TOP_K_FINAL=5
      - LOG_LEVEL=INFO
    volumes:
      - chroma_data:/app/data/chroma_db    # persistent vector DB
      - upload_data:/app/data/uploads      # persistent uploaded PDFs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag_network

  # ── Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data                   # persistent cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro  # serve frontend directly
    depends_on:
      - app
    networks:
      - rag_network

# ── Volumes ───────────────────────────────────────────────────
volumes:
  chroma_data:
  upload_data:
  redis_data:

# ── Network ───────────────────────────────────────────────────
networks:
  rag_network:
    driver: bridge