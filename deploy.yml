# .github/workflows/deploy.yml
# ============================================================
# CI/CD Pipeline — GitHub Actions
#
# Triggers:
#   - Push to main branch
#
# Pipeline:
#   1. test    — lint + basic import check
#   2. build   — build & push Docker image to GitHub Container Registry (free)
#   3. deploy  — trigger Railway redeploy via webhook
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GROQ_API_KEY          your Groq API key (for smoke test)
#   RAILWAY_WEBHOOK_URL   from Railway → Project → Settings → Deploy Webhook
# ============================================================

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rag-assistant

jobs:

  # ── Job 1: Test ───────────────────────────────────────────
  test:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install torch CPU
        run: |
          pip install torch==2.4.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu \
            --no-cache-dir

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all modules import cleanly
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "from config.settings import get_settings; get_settings()"
          python -c "from models.schemas import QueryRequest, QueryResponse"
          python -c "from core.ingestion.chunker import SemanticChunker"
          python -c "from core.ingestion.pdf_loader import PDFLoader"
          echo "✅ All imports OK"

  # ── Job 2: Build & Push Docker Image ─────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # GitHub Actions cache — speeds up rebuilds
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Railway ──────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Railway deploy
        run: |
          curl -s -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"event": "deploy", "ref": "${{ github.sha }}"}' \
          && echo "✅ Deploy triggered"